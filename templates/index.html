<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechBot — Smart. Swift. Support.</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0d1b3e;
      --navy2:   #132244;
      --navy3:   #1a2d5a;
      --blue:    #1e6fd9;
      --cyan:    #38bdf8;
      --cyan2:   #7dd3fc;
      --white:   #f0f6ff;
      --muted:   #8aabd4;
      --card:    rgba(255,255,255,0.05);
      --border:  rgba(56,189,248,0.18);
      --radius:  14px;
      --shadow:  0 8px 32px rgba(0,0,0,0.35);
    }

    html, body {
      height: 100%;
      font-family: 'Sora', sans-serif;
      background: var(--navy);
      color: var(--white);
      overflow: hidden;
    }

    /* ── Stars background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 40%, rgba(30,111,217,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(56,189,248,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(13,27,62,0.9) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Navbar ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 62px;
      background: rgba(13,27,62,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--white);
      text-decoration: none;
    }

    /* SVG robot logo inline */
    .nav-robot {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 400;
      transition: color .2s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--cyan); }

    /* ── Main area ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Welcome screen (shown when no chat) ── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 60px;
      gap: 32px;
      text-align: center;
      animation: fadeUp .6s ease both;
    }

    .welcome.hidden { display: none; }

    .welcome-header { display: flex; flex-direction: column; align-items: center; gap: 20px; }

    .welcome p { max-width: 420px; margin: 0 auto; }

    .quick-cards { justify-content: center; }

    .robot-big {
      width: 110px;
      height: 110px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 24px rgba(56,189,248,0.4));
      animation: float 3.5s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .welcome h1 {
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1.15;
      color: var(--white);
    }

    .welcome h1 span { color: var(--cyan); }

    .welcome p {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 300;
      max-width: 420px;
    }

    /* Quick-action cards */
    .quick-cards {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .qcard {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .15s;
      min-width: 170px;
    }

    .qcard:hover {
      background: rgba(56,189,248,0.10);
      border-color: var(--cyan);
      transform: translateY(-2px);
    }

    .qcard strong {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 4px;
    }

    .qcard span {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── Chat view ── */
    .chat-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-view.hidden { display: none; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 60px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .msg {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      animation: fadeUp .3s ease both;
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .msg.bot  .msg-avatar { background: var(--navy3); border: 1px solid var(--border); }
    .msg.user .msg-avatar { background: var(--blue); color: white; }

    .msg-bubble {
      max-width: 68%;
      padding: 13px 18px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .msg.bot .msg-bubble {
      background: var(--navy3);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--white);
    }

    .msg.user .msg-bubble {
      background: var(--blue);
      border-bottom-right-radius: 4px;
      color: white;
    }

    /* Typing indicator */
    .typing .msg-bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 20px;
    }

    .dot {
      width: 7px; height: 7px;
      background: var(--cyan);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity:.4; }
      40%          { transform: translateY(-6px); opacity:1; }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 18px 60px 24px;
      flex-shrink: 0;
      background: linear-gradient(to top, var(--navy) 70%, transparent);
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: var(--navy3);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 6px 8px 6px 24px;
      gap: 10px;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-wrap:focus-within {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.12);
    }

    .input-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Sora', sans-serif;
      font-size: 0.92rem;
      color: var(--white);
      padding: 8px 0;
    }

    .input-wrap input::placeholder { color: var(--muted); }

    .send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--blue);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .15s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--cyan); transform: scale(1.07); }

    .send-btn svg { width: 18px; height: 18px; fill: white; }

    /* ── Utility ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Scrollbar ── */
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      nav { padding: 0 18px; }
      .welcome, .messages, .input-bar { padding-left: 18px; padding-right: 18px; }
      .welcome h1 { font-size: 1.8rem; }
      .robot-big { width: 72px; height: 72px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── NAVBAR ── -->
  <nav>
    <a class="nav-brand" href="#">
      <!-- Robot SVG logo (from TechBot image) -->
      <svg class="nav-robot" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- antenna -->
        <line x1="50" y1="18" x2="62" y2="8" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
        <circle cx="64" cy="6" r="4" fill="#38bdf8"/>
        <!-- ears -->
        <rect x="10" y="34" width="10" height="18" rx="4" fill="#1a2d5a"/>
        <rect x="80" y="34" width="10" height="18" rx="4" fill="#1a2d5a"/>
        <!-- head -->
        <rect x="20" y="22" width="60" height="52" rx="18" fill="#1a2d5a"/>
        <!-- eyes -->
        <circle cx="37" cy="45" r="9" fill="#38bdf8" opacity=".9"/>
        <circle cx="63" cy="45" r="9" fill="#38bdf8" opacity=".9"/>
        <circle cx="37" cy="45" r="4" fill="#0d1b3e"/>
        <circle cx="63" cy="45" r="4" fill="#0d1b3e"/>
        <!-- smile -->
        <path d="M38 60 Q50 70 62 60" stroke="#38bdf8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      TechBot
    </a>

    <ul class="nav-links">
      <li><a href="#" class="active" onclick="showWelcome(event)">Accueil</a></li>
      <li><a href="#" onclick="showChat(event)">Chat</a></li>
      <li><a href="#">À propos</a></li>
    </ul>
  </nav>

  <!-- ── MAIN ── -->
  <main>

    <!-- Welcome screen -->
    <div class="welcome" id="welcome">
      <div class="welcome-header">
        <!-- Big robot SVG -->
        <svg class="robot-big" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
          <line x1="50" y1="16" x2="65" y2="4" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
          <circle cx="67" cy="3" r="5" fill="#38bdf8"/>
          <rect x="8"  y="32" width="12" height="22" rx="5" fill="#1a2d5a"/>
          <rect x="80" y="32" width="12" height="22" rx="5" fill="#1a2d5a"/>
          <rect x="20" y="18" width="60" height="54" rx="20" fill="#1a2d5a"/>
          <circle cx="37" cy="43" r="10" fill="#38bdf8"/>
          <circle cx="63" cy="43" r="10" fill="#38bdf8"/>
          <circle cx="37" cy="43" r="5"  fill="#0d1b3e"/>
          <circle cx="63" cy="43" r="5"  fill="#0d1b3e"/>
          <path d="M36 60 Q50 72 64 60" stroke="#38bdf8" stroke-width="3" fill="none" stroke-linecap="round"/>
          <!-- body -->
          <rect x="30" y="76" width="40" height="28" rx="10" fill="#1a2d5a"/>
          <rect x="38" y="82" width="24" height="10" rx="4" fill="#0d1b3e" opacity=".6"/>
        </svg>

        <div>
          <h1>👋 Bonjour !<br/><span>PC HelpBot</span></h1>
          <p style="margin-top:10px;">Je suis là pour vous aider en cas de panne informatique.</p>
        </div>
      </div>

      <!-- Quick cards -->
      <div class="quick-cards">
        <div class="qcard" onclick="sendQuick('Problèmes courants')">
          <strong>🔧 Problèmes courants</strong>
          <span>Solutions rapides</span>
        </div>
        <div class="qcard" onclick="sendQuick('Diagnostic guidé')">
          <strong>🩺 Diagnostic guidé</strong>
          <span>Étape par étape</span>
        </div>
        <div class="qcard" onclick="sendQuick('Contacter un humain')">
          <strong>🧑‍💻 Contacter un humain</strong>
          <span>Support avancé</span>
        </div>
      </div>

      <!-- Input bar on welcome too -->
      <div class="input-bar" style="padding:0; width:100%; max-width:600px; margin:0 auto;">
        <div class="input-wrap">
          <input type="text" id="welcome-input" placeholder="Décrivez votre problème…"
            onkeydown="if(event.key==='Enter') sendMessage(this.value)"/>
          <button class="send-btn" onclick="sendMessage(document.getElementById('welcome-input').value)">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Chat view -->
    <div class="chat-view hidden" id="chat-view">
      <div class="messages" id="messages"></div>
      <div class="input-bar">
        <div class="input-wrap">
          <input type="text" id="chat-input" placeholder="Posez votre question…"
            onkeydown="if(event.key==='Enter') sendMessage(this.value)"/>
          <button class="send-btn" onclick="sendMessage(document.getElementById('chat-input').value)">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
  /* ── State ── */
  let chatStarted = false;

  /* ── Nav helpers ── */
  function showWelcome(e) {
    if (e) e.preventDefault();
    document.getElementById('welcome').classList.remove('hidden');
    document.getElementById('chat-view').classList.add('hidden');
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    document.querySelectorAll('.nav-links a')[0].classList.add('active');
  }

  function showChat(e) {
    if (e) e.preventDefault();
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('chat-view').classList.remove('hidden');
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    document.querySelectorAll('.nav-links a')[1].classList.add('active');
    document.getElementById('chat-input').focus();
  }

  /* ── Quick send ── */
  function sendQuick(text) {
    showChat();
    sendMessage(text);
  }

  /* ── Add message bubble ── */
  function addMessage(role, text) {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    if (role === 'bot') {
      avatar.innerHTML = `<svg viewBox="0 0 40 40" width="20" height="20">
        <rect x="8" y="8" width="24" height="22" rx="8" fill="#38bdf8"/>
        <circle cx="15" cy="18" r="3.5" fill="#0d1b3e"/>
        <circle cx="25" cy="18" r="3.5" fill="#0d1b3e"/>
        <path d="M14 25 Q20 30 26 25" stroke="#0d1b3e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>`;
    } else {
      avatar.textContent = 'Moi';
      avatar.style.fontSize = '0.65rem';
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;

    div.appendChild(avatar);
    div.appendChild(bubble);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  /* ── Typing indicator ── */
  function showTyping() {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot typing';
    div.id = 'typing';
    div.innerHTML = `
      <div class="msg-avatar">
        <svg viewBox="0 0 40 40" width="20" height="20">
          <rect x="8" y="8" width="24" height="22" rx="8" fill="#38bdf8"/>
          <circle cx="15" cy="18" r="3.5" fill="#0d1b3e"/>
          <circle cx="25" cy="18" r="3.5" fill="#0d1b3e"/>
          <path d="M14 25 Q20 30 26 25" stroke="#0d1b3e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="msg-bubble">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  /* ── Send message to Flask ── */
  async function sendMessage(text) {
    text = text.trim();
    if (!text) return;

    /* clear inputs */
    document.getElementById('welcome-input').value = '';
    document.getElementById('chat-input').value = '';

    /* switch to chat view */
    if (!chatStarted) {
      showChat();
      chatStarted = true;
    }

    addMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      removeTyping();
      addMessage('bot', data.reply || "Pas de réponse.");
    } catch (err) {
      removeTyping();
      addMessage('bot', 'Erreur de connexion. Veuillez réessayer.');
    }
  }
</script>

</body>
</html>
