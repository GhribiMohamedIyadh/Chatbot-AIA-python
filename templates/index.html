<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechBot — Smart. Swift. Support.</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../static/style.css">
</head>
<body>
<div class="app">

  <!-- ── NAVBAR ── -->
  <nav>
    <a class="nav-brand" href="#">
      <!-- Robot SVG logo (from TechBot image) -->
      <svg class="nav-robot" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- antenna -->
        <line x1="50" y1="18" x2="62" y2="8" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
        <circle cx="64" cy="6" r="4" fill="#38bdf8"/>
        <!-- ears -->
        <rect x="10" y="34" width="10" height="18" rx="4" fill="#1a2d5a"/>
        <rect x="80" y="34" width="10" height="18" rx="4" fill="#1a2d5a"/>
        <!-- head -->
        <rect x="20" y="22" width="60" height="52" rx="18" fill="#1a2d5a"/>
        <!-- eyes -->
        <circle cx="37" cy="45" r="9" fill="#38bdf8" opacity=".9"/>
        <circle cx="63" cy="45" r="9" fill="#38bdf8" opacity=".9"/>
        <circle cx="37" cy="45" r="4" fill="#0d1b3e"/>
        <circle cx="63" cy="45" r="4" fill="#0d1b3e"/>
        <!-- smile -->
        <path d="M38 60 Q50 70 62 60" stroke="#38bdf8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      TechBot
    </a>

    <ul class="nav-links">
      <li><a href="#" class="active" onclick="showWelcome(event)">Accueil</a></li>
      <li><a href="#" onclick="showChat(event)">Chat</a></li>
      <li><a href="#">À propos</a></li>
    </ul>
  </nav>

  <!-- ── MAIN ── -->
  <main>

    <!-- Welcome screen -->
    <div class="welcome" id="welcome">
      <div class="welcome-header">
        <!-- Big robot SVG -->
        <svg class="robot-big" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
          <line x1="50" y1="16" x2="65" y2="4" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
          <circle cx="67" cy="3" r="5" fill="#38bdf8"/>
          <rect x="8"  y="32" width="12" height="22" rx="5" fill="#1a2d5a"/>
          <rect x="80" y="32" width="12" height="22" rx="5" fill="#1a2d5a"/>
          <rect x="20" y="18" width="60" height="54" rx="20" fill="#1a2d5a"/>
          <circle cx="37" cy="43" r="10" fill="#38bdf8"/>
          <circle cx="63" cy="43" r="10" fill="#38bdf8"/>
          <circle cx="37" cy="43" r="5"  fill="#0d1b3e"/>
          <circle cx="63" cy="43" r="5"  fill="#0d1b3e"/>
          <path d="M36 60 Q50 72 64 60" stroke="#38bdf8" stroke-width="3" fill="none" stroke-linecap="round"/>
          <!-- body -->
          <rect x="30" y="76" width="40" height="28" rx="10" fill="#1a2d5a"/>
          <rect x="38" y="82" width="24" height="10" rx="4" fill="#0d1b3e" opacity=".6"/>
        </svg>

        <div>
          <h1>👋 Bonjour !<br/><span>PC HelpBot</span></h1>
          <p style="margin-top:10px;">Je suis là pour vous aider en cas de panne informatique.</p>
        </div>
      </div>

      <!-- Quick cards -->
      <div class="quick-cards">
        <div class="qcard" onclick="sendQuick('Problèmes courants')">
          <strong>🔧 Problèmes courants</strong>
          <span>Solutions rapides</span>
        </div>
        <div class="qcard" onclick="sendQuick('Diagnostic guidé')">
          <strong>🩺 Diagnostic guidé</strong>
          <span>Étape par étape</span>
        </div>
        <div class="qcard" onclick="sendQuick('Contacter un humain')">
          <strong>🧑‍💻 Contacter un humain</strong>
          <span>Support avancé</span>
        </div>
      </div>

      <!-- Input bar on welcome too -->
      <div class="input-bar" style="padding:0; width:100%; max-width:600px; margin:0 auto;">
        <div class="input-wrap">
          <input type="text" id="welcome-input" placeholder="Décrivez votre problème…"
            onkeydown="if(event.key==='Enter') sendMessage(this.value)"/>
          <button class="send-btn" onclick="sendMessage(document.getElementById('welcome-input').value)">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Chat view -->
    <div class="chat-view hidden" id="chat-view">
      <div class="messages" id="messages" name="message"></div>
      <div class="input-bar">
        <div class="input-wrap">
          <input type="text" id="chat-input" placeholder="Posez votre question…"
            onkeydown="if(event.key==='Enter') sendMessage(this.value)"/>
          <button class="send-btn" onclick="sendMessage(document.getElementById('chat-input').value)">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
  /* ── State ── */
  let chatStarted = false;

  /* ── Nav helpers ── */
  function showWelcome(e) {
    if (e) e.preventDefault();
    document.getElementById('welcome').classList.remove('hidden');
    document.getElementById('chat-view').classList.add('hidden');
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    document.querySelectorAll('.nav-links a')[0].classList.add('active');
  }

  function showChat(e) {
    if (e) e.preventDefault();
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('chat-view').classList.remove('hidden');
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    document.querySelectorAll('.nav-links a')[1].classList.add('active');
    document.getElementById('chat-input').focus();
  }

  /* ── Quick send ── */
  function sendQuick(text) {
    showChat();
    sendMessage(text);
  }

  /* ── Add message bubble ── */
  function addMessage(role, text) {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    if (role === 'bot') {
      avatar.innerHTML = `<svg viewBox="0 0 40 40" width="20" height="20">
        <rect x="8" y="8" width="24" height="22" rx="8" fill="#38bdf8"/>
        <circle cx="15" cy="18" r="3.5" fill="#0d1b3e"/>
        <circle cx="25" cy="18" r="3.5" fill="#0d1b3e"/>
        <path d="M14 25 Q20 30 26 25" stroke="#0d1b3e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>`;
    } else {
      avatar.textContent = 'Moi';
      avatar.style.fontSize = '0.65rem';
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = text.replace(/\n/g, "<br>");

    div.appendChild(avatar);
    div.appendChild(bubble);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  /* ── Typing indicator ── */
  function showTyping() {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot typing';
    div.id = 'typing';
    div.innerHTML = `
      <div class="msg-avatar">
        <svg viewBox="0 0 40 40" width="20" height="20">
          <rect x="8" y="8" width="24" height="22" rx="8" fill="#38bdf8"/>
          <circle cx="15" cy="18" r="3.5" fill="#0d1b3e"/>
          <circle cx="25" cy="18" r="3.5" fill="#0d1b3e"/>
          <path d="M14 25 Q20 30 26 25" stroke="#0d1b3e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="msg-bubble">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  /* ── Send message to Flask ── */
  async function sendMessage(text) {
    text = text.trim();
    if (!text) return;

    /* clear inputs */
    document.getElementById('welcome-input').value = '';
    document.getElementById('chat-input').value = '';

    /* switch to chat view */
    if (!chatStarted) {
      showChat();
      chatStarted = true;
    }

    addMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      removeTyping();
      addMessage('bot', data.reply || "Pas de réponse.");
    } catch (err) {
      removeTyping();
      addMessage('bot', 'Erreur de connexion. Veuillez réessayer.');
    }
  }
</script>

</body>
</html>
